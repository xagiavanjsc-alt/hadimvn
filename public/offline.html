<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hàn Quốc Ơi! - Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: #0f1117;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.05);
      }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f59e0b;
    }

    p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .tips {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }

    .tips h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: rgba(255, 255, 255, 0.9);
    }

    .tips ul {
      list-style: none;
    }

    .tips li {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
      padding-left: 20px;
      position: relative;
    }

    .tips li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #f59e0b;
    }

    button {
      background: linear-gradient(135deg, #f59e0b 0%, #d4b43a 100%);
      color: #000;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }

    .status.online {
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📚</div>
    <h1>Hàn Quốc Ơi!</h1>
    <p>Bạn đang offline. Một số tính năng cần kết nối internet.</p>
    
    <div class="tips">
      <h3>Bạn vẫn có thể:</h3>
      <ul>
        <li>Ôn tập flashcard đã tải</li>
        <li>Xem từ vựng đã học</li>
        <li>Review offline</li>
      </ul>
    </div>
    
    <button onclick="location.reload()">Thử lại</button>
    
    <div class="status" id="status">Đang kiểm tra kết nối...</div>
  </div>

  <script>
    // Check connection status
    function checkConnection() {
      const statusEl = document.getElementById('status');
      
      if (navigator.onLine) {
        statusEl.textContent = 'Đang kết nối...';
        statusEl.classList.add('online');
        // Try to reload if online
        setTimeout(() => {
          if (navigator.onLine) {
            location.reload();
          }
        }, 1000);
      } else {
        statusEl.textContent = 'Không có kết nối internet';
        statusEl.classList.remove('online');
      }
    }

    // Listen for connection changes
    window.addEventListener('online', checkConnection);
    window.addEventListener('offline', checkConnection);

    // Initial check
    checkConnection();

    // Auto-retry every 5 seconds
    setInterval(checkConnection, 5000);
  </script>
</body>
</html>
