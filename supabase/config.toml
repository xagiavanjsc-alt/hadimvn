# Supabase Configuration File
# For local development and deployment

project_id = "hanquocoi"

[api]
# Port to use for Supabase API
port = 54321
# Schemas to expose in your API
schemas = ["public", "storage", "graphql_public"]
# Extra schemas to add to the search_path of every request
extra_search_path = ["public", "extensions"]
# Maximum rows to return from a table or view
max_rows = 1000

[db]
# Port to use for local PostgreSQL database
port = 54322
# Major version of PostgreSQL
major_version = 17

[studio]
# Port to use for Supabase Studio
port = 54323

[inbucket]
# Port to use for Inbucket (email testing)
port = 54324

[storage]

[auth]
# The site URL to use for redirects
site_url = "http://localhost:3000"
# Additional redirect URLs
additional_redirect_urls = ["https://localhost:3000"]
# How long tokens are valid for
jwt_expiry = 3600

[realtime]

[functions]

[functions.admin-grant-vip]
verify_jwt = false

[functions.vip-expiry-scheduler]
verify_jwt = false

[functions.zalo-reminder-scheduler]
verify_jwt = false

[functions.send-email-resend]
verify_jwt = false
